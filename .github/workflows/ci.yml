name: CI/CD — Photon Framework

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  V_BRANCH: 'weekly.2025.06'           # V 0.5.x stable releases
  APP_NAME: photon

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Build & Test (all PRs, all pushes)
  # ──────────────────────────────────────────────
  test:
    name: 'Test (${{ matrix.module }})'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - config
          - log
          - security
          - cli
          - web
          - orm
          - http
          - queue
          - support
          - ticker
          - cache
          - pool
          - locking
    steps:
      - uses: actions/checkout@v4

      - name: Setup V (cached)
        uses: alexesprit/setup-v@v1
        with:
          v-version: 'weekly.2025.06'

      - name: Verify V
        run: |
          v --version
          v doctor 2>&1 || true

      - name: Test ${{ matrix.module }}
        run: |
          cd photon
          v -enable-globals test ${{ matrix.module }}/ -stats 2>&1 || {
            echo "::error::Module ${{ matrix.module }} tests failed"
            exit 1
          }

  test-summary:
    name: 'All Tests Passed'
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check status
        run: |
          echo "All 13 module tests completed"
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "::notice::✅ All tests passed"
          elif [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::❌ Some tests failed"
            exit 1
          else
            echo "::warning::⚠️ Tests cancelled or skipped"
          fi

  # ──────────────────────────────────────────────
  # Stage 2: Build Example (on push to main/master)
  # ──────────────────────────────────────────────
  build:
    name: 'Build Example'
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Setup V
        uses: alexesprit/setup-v@v1
        with:
          v-version: 'weekly.2025.06'

      - name: Build example
        run: |
          cd photon
          v -enable-globals -prod -o bin/${{ env.APP_NAME }} example/main.v
          echo "Binary: photon/bin/${{ env.APP_NAME }}"
          ls -lh photon/bin/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-binary
          path: photon/bin/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────
  # Stage 3: Docker Build (on main/master push)
  # ──────────────────────────────────────────────
  docker:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-binary
          path: photon/bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: photon/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.APP_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.APP_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
