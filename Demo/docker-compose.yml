# ═══════════════════════════════════════════════════════════
# PhotonBlog Demo — Docker Compose 多服务编排
# ═══════════════════════════════════════════════════════════
#
# 用法：
#   docker-compose up -d              启动全部服务
#   docker-compose logs -f app        查看 app 日志
#   docker-compose down               停止全部服务
#
# 服务说明：
#   app       — Web 服务（HTTP API，端口 8080）
#   queue     — 队列 Worker（消费异步任务）
#   scheduler — 定时调度器（cron 任务）
#   redis     — 缓存/队列后端（可选，默认内存）
# ═══════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── Web 应用服务 ──
  app:
    build:
      context: ..
      dockerfile: Demo/Dockerfile
    image: photonblog:latest
    container_name: photonblog-app
    restart: unless-stopped
    ports:
      - "${APP_SERVER_PORT:-8080}:8080"
    environment:
      - APP_PROFILE=${APP_PROFILE:-prod}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_SERVER_HOST=0.0.0.0
      - APP_SERVER_PORT=8080
      - DB_PATH=/app/storage/photonblog.db
      - JWT_SECRET=${JWT_SECRET:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-memory}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_CHANNEL=file
      - LOG_JSON_FORMAT=true
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config:ro
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - photonblog-net

  # ── 队列 Worker 服务 ──
  queue:
    image: photonblog:latest
    container_name: photonblog-queue
    restart: unless-stopped
    command: ["./demo", "queue:work"]
    environment:
      - APP_PROFILE=${APP_PROFILE:-prod}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_PATH=/app/storage/photonblog.db
      - JWT_SECRET=${JWT_SECRET:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-memory}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_CHANNEL=file
      - LOG_JSON_FORMAT=true
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config:ro
      - ./.env:/app/.env:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - photonblog-net

  # ── 定时调度器服务 ──
  scheduler:
    image: photonblog:latest
    container_name: photonblog-scheduler
    restart: unless-stopped
    command: ["./demo", "scheduler:run"]
    environment:
      - APP_PROFILE=${APP_PROFILE:-prod}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_PATH=/app/storage/photonblog.db
      - JWT_SECRET=${JWT_SECRET:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-memory}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_CHANNEL=file
      - LOG_JSON_FORMAT=true
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config:ro
      - ./.env:/app/.env:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - photonblog-net

  # ── Redis 缓存/队列后端（可选） ──
  redis:
    image: redis:7-alpine
    container_name: photonblog-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - photonblog-net
    profiles:
      - redis

networks:
  photonblog-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
