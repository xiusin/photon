<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photon API 文档</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@fluentui/web-components@3.0.0/dist/web-components.min.js"></script>
  <link rel="stylesheet" href="/__docs/static/app.css">
</head>
<body>
  <div class="app-layout" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          API 文档
        </h1>
        <p>实时自动生成 · 可编辑锁定</p>
      </div>
      <div class="sidebar-search">
        <fluent-text-field id="searchInput" placeholder="搜索路由..." appearance="outline"></fluent-text-field>
      </div>
      <div class="sidebar-groups" id="sidebarGroups">
        <div class="spinner"></div>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="main-header">
        <span class="header-title" id="headerTitle">API 文档管理器</span>
        <div class="header-actions">
          <fluent-button id="refreshBtn" appearance="outline" size="small" onclick="loadEntries()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            刷新
          </fluent-button>
          <fluent-button appearance="outline" size="small" onclick="toggleTheme()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            主题
          </fluent-button>
        </div>
      </div>

      <div id="contentArea">
        <div class="empty-state" id="emptyState">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <h2>暂无 API 文档</h2>
          <p>发送 HTTP 请求到您的应用，文档将自动生成。</p>
          <fluent-button appearance="accent" onclick="loadEntries()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            检查数据
          </fluent-button>
        </div>
        <div class="detail-view" id="detailView" style="display:none"></div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/__docs/static/app.js"></script>
</body>
</html>
